<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEV Art - Player V8</title>
    <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f14; --card: #14141d; --accent: #a1ff8f;
            --wave: #2a2a35; --text: #ecece9; --dim: #70707a;
        }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Martian Mono', monospace; 
            margin: 0; padding: 20px; width: 100vw; overflow-x: hidden;
        }
        
        .player-box { width: 100%; background: var(--card); padding: 30px; border-radius: 4px; }
        .main-row { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        
        /* Waveform */
        .waveform-area { flex-grow: 1; height: 140px; position: relative; cursor: crosshair; background: rgba(0,0,0,0.4); border-radius: 2px; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .progress-canvas { z-index: 2; clip-path: inset(0 100% 0 0); }
        .playhead { position: absolute; top: 0; left: 0; width: 2px; height: 100%; background: #fff; z-index: 3; pointer-events: none; }
        
        .btn-main { background: var(--accent); border: none; width: 64px; height: 64px; border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .btn-main svg { width: 30px; fill: #000; }
        
        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 25px; }
        .action-btn { background: transparent; border: 1px solid var(--wave); color: var(--text); padding: 12px; border-radius: 4px; cursor: pointer; font-size: 13px; text-transform: uppercase; transition: 0.2s; }
        .action-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .action-btn:disabled { opacity: 0.1; }
        .action-btn.recording { color: #ff5f5f; border-color: #ff5f5f; }

        .slider-wrap { display: flex; flex-direction: column; gap: 8px; font-size: 9px; color: var(--dim); }
        input[type=range] { accent-color: var(--accent); width: 100%; cursor: pointer; }
        
        .status { font-size: 10px; color: var(--dim); margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Switch Loop */
        .loop-wrap { display: flex; align-items: center; gap: 10px; font-size: 10px; color: var(--dim); }
    </style>
</head>
<body>

<div class="player-box">
    <div class="main-row">
        <button id="playBtn" class="btn-main" disabled><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
        <div id="waveWrap" class="waveform-area">
            <canvas id="cvBg"></canvas>
            <canvas id="cvPr" class="progress-canvas"></canvas>
            <div id="head" class="playhead"></div>
        </div>
    </div>

    <div class="control-grid">
        <button class="action-btn" onclick="document.getElementById('fileIn').click()">↑ Carregar Arquivo</button>
        <button id="recBtn" class="action-btn">● Gravar Microfone</button>
        <button id="dlBtn" class="action-btn" disabled>↓ Download WAV</button>
        <button id="normBtn" class="action-btn" disabled>⚡ Normalizar Volume</button>
        <button id="revBtn" class="action-btn" disabled>⇄ Inverter (Reverse)</button>
        <button id="trimBtn" class="action-btn" disabled>✄ Cortar Seleção</button>

        <div class="slider-wrap">
            <span>SPEED (VELOCIDADE): <span id="speedVal">1.0</span>x</span>
            <input type="range" id="speedIn" min="0.25" max="3.0" step="0.05" value="1.0">
        </div>

        <div class="slider-wrap">
            <span>PITCH (TOM): <span id="pitchVal">0</span> cents</span>
            <input type="range" id="pitchIn" min="-5000" max="5000" step="50" value="0">
        </div>

        <div class="loop-wrap">
            <input type="checkbox" id="loopIn"> <span>LOOP ATIVADO</span>
        </div>
    </div>

    <div id="status" class="status">Status: Aguardando interação...</div>
    <input type="file" id="fileIn" accept="audio/*" hidden>
</div>

<script>
let ctx, buffer, source, isPlaying = false, isRecording = false;
let pausedAt = 0, startTime = 0, recorder, chunks = [], currentBlob;
let selStart = 0, selEnd = 0;

const dom = {
    play: document.getElementById('playBtn'),
    rec: document.getElementById('recBtn'),
    dl: document.getElementById('dlBtn'),
    rev: document.getElementById('revBtn'),
    norm: document.getElementById('normBtn'),
    trim: document.getElementById('trimBtn'),
    speed: document.getElementById('speedIn'),
    pitch: document.getElementById('pitchIn'),
    loop: document.getElementById('loopIn'),
    status: document.getElementById('status'),
    cvBg: document.getElementById('cvBg'),
    cvPr: document.getElementById('cvPr'),
    head: document.getElementById('head'),
    wrap: document.getElementById('waveWrap')
};

// --- FIX: AUDIO CONTEXT NATIVO ---
function initCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
}

// --- CONTROLES DE PITCH E SPEED INDEPENDENTES ---
dom.speed.oninput = (e) => {
    document.getElementById('speedVal').innerText = e.target.value;
    if(isPlaying) refreshPlayback();
};
dom.pitch.oninput = (e) => {
    document.getElementById('pitchVal').innerText = e.target.value;
    if(isPlaying) refreshPlayback();
};

function refreshPlayback() {
    const currentPos = (ctx.currentTime - startTime) * dom.speed.value;
    play(currentPos % buffer.duration);
}

// --- ATALHO: ESPAÇO ---
window.addEventListener('keydown', (e) => {
    if (e.code === "Space") {
        e.preventDefault();
        dom.play.click();
    }
});

// --- CARREGAMENTO ---
document.getElementById('fileIn').onchange = async (e) => {
    const file = e.target.files[0];
    if (file) {
        initCtx();
        const ab = await file.arrayBuffer();
        process(ab, file.name);
    }
};

// --- GRAVAÇÃO ---
dom.rec.onclick = async () => {
    initCtx();
    if (!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'audio/wav' });
                process(await blob.arrayBuffer(), "Gravação Capturada");
            };
            recorder.start();
            isRecording = true;
            dom.rec.classList.add('recording');
            dom.status.innerText = "Status: Gravando microfone...";
        } catch(err) { dom.status.innerText = "Erro: Sem acesso ao microfone."; }
    } else {
        recorder.stop();
        isRecording = false;
        dom.rec.classList.remove('recording');
    }
};

async function process(ab, name) {
    dom.status.innerText = "Status: Processando...";
    buffer = await ctx.decodeAudioData(ab);
    dom.status.innerText = "Status: " + name;
    [dom.play, dom.dl, dom.rev, dom.norm, dom.trim].forEach(b => b.disabled = false);
    selStart = 0; selEnd = buffer.duration;
    draw();
}

// --- MOTOR DE ÁUDIO ---
function play(offset) {
    if (source) source.stop();
    source = ctx.createBufferSource();
    source.buffer = buffer;
    source.loop = dom.loop.checked;
    
    // Configurações independentes
    source.playbackRate.value = parseFloat(dom.speed.value);
    source.detune.value = parseFloat(dom.pitch.value);
    
    source.connect(ctx.destination);
    startTime = ctx.currentTime - (offset / source.playbackRate.value);
    source.start(0, offset);
    isPlaying = true;
    dom.play.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
    animate();
    
    source.onended = () => { if(!dom.loop.checked && isPlaying) resetUI(); };
}

function pause() {
    pausedAt = (ctx.currentTime - startTime) * dom.speed.value;
    if (source) source.stop();
    isPlaying = false;
    dom.play.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
}

dom.play.onclick = () => {
    initCtx();
    if(!buffer) return;
    isPlaying ? pause() : play(pausedAt % buffer.duration);
};

// --- VISUALIZAÇÃO ---
function draw() {
    const d = buffer.getChannelData(0);
    const w = dom.wrap.offsetWidth, h = dom.wrap.offsetHeight;
    dom.cvBg.width = dom.cvPr.width = w;
    dom.cvBg.height = dom.cvPr.height = h;
    
    const ctxBg = dom.cvBg.getContext('2d');
    const ctxPr = dom.cvPr.getContext('2d');
    const step = Math.ceil(d.length / w);
    
    ctxBg.clearRect(0,0,w,h); ctxPr.clearRect(0,0,w,h);
    
    for(let i=0; i<w; i++){
        let min=1, max=-1;
        for(let j=0; j<step; j++){
            const v = d[(i*step)+j];
            if(v<min) min=v; if(v>max) max=v;
        }
        const y = (1+min)*(h/2);
        const barH = Math.max(1, (max-min)*(h/2));
        ctxBg.fillStyle = '#2a2a35'; ctxBg.fillRect(i, y, 1, barH);
        ctxPr.fillStyle = '#a1ff8f'; ctxPr.fillRect(i, y, 1, barH);
    }
}

function animate() { if(isPlaying) { updateUI(); requestAnimationFrame(animate); } }

function updateUI() {
    let curr = isPlaying ? (ctx.currentTime - startTime) * dom.speed.value : pausedAt;
    if(dom.loop.checked) curr %= buffer.duration;
    const ratio = buffer ? Math.min(curr / buffer.duration, 1) : 0;
    dom.head.style.left = (ratio * 100) + "%";
    dom.cvPr.style.clipPath = `inset(0 ${100 - (ratio * 100)}% 0 0)`;
}

function resetUI() { isPlaying = false; pausedAt = 0; updateUI(); dom.play.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'; }

// Seek no clique
dom.wrap.onclick = (e) => {
    if (!buffer) return;
    const ratio = (e.clientX - dom.wrap.getBoundingClientRect().left) / dom.wrap.offsetWidth;
    const time = ratio * buffer.duration;
    pausedAt = time;
    updateUI();
    if(isPlaying) play(time);
};

// --- FUNÇÕES DE EDIÇÃO ---
dom.rev.onclick = () => {
    for (let i = 0; i < buffer.numberOfChannels; i++) buffer.getChannelData(i).reverse();
    draw(); dom.status.innerText = "Status: Áudio Invertido.";
};

dom.norm.onclick = () => {
    for (let i = 0; i < buffer.numberOfChannels; i++) {
        const data = buffer.getChannelData(i);
        const max = data.reduce((a, b) => Math.max(a, Math.abs(b)), 0);
        if (max > 0) {
            const ratio = 1 / max;
            for (let j = 0; j < data.length; j++) data[j] *= ratio;
        }
    }
    draw(); dom.status.innerText = "Status: Volume Normalizado.";
};
</script>
</body>
</html>
