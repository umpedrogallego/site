<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro Gallego - v.13</title>

<link href="https://api.fontshare.com/v2/css?f[]=supreme@100,101,200,201,300,301,400,401,500,501,700,701,800,801&display=swap" rel="stylesheet">


    <style>
        :root {
            --bg: #ecece9; --text: #0f0f0f; --border: #000;
            --meta-color: #948a8d; --font-site: 'Supreme', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: var(--font-site); background-color: var(--bg); color: var(--text); 
            -webkit-font-smoothing: antialiased;
        }
        
        .font-selector-wrap {
    position: fixed; bottom: 20px; right: 20px; z-index: 99999;
}
.font-selector-wrap select {
    font-family: inherit; font-size: 10px; padding: 5px; border: 1px solid #000; background: #fff; cursor: pointer;
}
        
        /* --- HEADER --- */
        header {
    padding: 40px; 
    max-width: 1400px; /* Mesma do grid */
    width: 100%;      /* Garante que ele ocupe o espaço disponível até o limite */
    margin: 0 auto;    /* Centraliza o bloco no eixo horizontal */
    display: flex; 
    justify-content: space-between; 
    align-items: flex-end;
    background: transparent; 
    position: sticky; 
    top: 0; 
    z-index: 1000;
            
        }
        header h1 { background: white filter: invert(1); font-size: 38px; font-weight: 550; letter-spacing: -1px; text-transform: uppercase;}


        /* --- GRID 12 COLUNAS --- */
        #main-grid {
            display: grid; grid-template-columns: repeat(12, 1fr);
            gap: 120px 30px; padding: 100px 40px; max-width: 1400px; margin: 0 auto;
            align-items: start;
        }

        .item-obra { position: relative; display: flex; flex-direction: column; }

        .img-box { width: 100%; display: flex; align-items: flex-start; }
        .img-box img, .img-box video { width: 100%; height: auto; display: block; object-fit: contain; }

        .meta { margin-top: 15px; }
        .meta strong { 
            font-weight: 500; font-size: clamp(13px, 0.9vw + 10.1px, 24px); letter-spacing: clamp(-0.8px, -0.06vw - 0.12px, -0.2px); color: var(--meta-color); 
            text-transform: none; display: block; margin-left: 12px;
        }


        /* Slots com Desalinhamento Superior */
        .slot-1 { grid-column: span 5; margin-top: -15px; }
        .slot-2 { grid-column: span 4; margin-top: 60px; }
        .slot-3 { grid-column: span 3; margin-top: 100px; }
        .slot-4 { grid-column: span 5; margin-top: 30px; }
        .slot-5 { grid-column: span 7; margin-top: 80px; }


        @media (max-width: 768px) {
            #main-grid { flex-direction: column; gap: 8px; padding: 6px; }
            .item-obra { width: 100% !important; margin-bottom: 38px;}
            .meta strong { font-size: 0; }
        .slot-1 { grid-column: span 4; margin-top: -10px; }
        .slot-2 { grid-column: span 4; margin-top: 10px; }
        .slot-3 { grid-column: span 4; margin-top: 15px; }
        .slot-4 { grid-column: span 4; margin-top: 20px; }
        .slot-5 { grid-column: span 8; margin-top: 0px; }
        }
    </style>
</head>
<body>

<header id="site-header">
    <a href="index.html" style="text-decoration:none; color:inherit;"><h1 style="margin-left: -2px; ">Pedro Gallego</h1></a>
    <div style="display:flex; gap:20px; align-items:center;">
        
        <nav style="display:flex; gap:32px; text-transform:uppercase; font-size:18px; ">
            <a href="index.html" style="font-weight:500; color:inherit; text-decoration:none; filter: opacity(50%);">obras</a>
            <a href="cv.html" style="color:inherit; text-decoration:none;">cv</a>
            <a href="#" style="color:inherit; text-decoration:none;">info</a>
        </nav>
    </div>
</header>

<main id="main-grid"></main>

<script>
    const URL_JSON = "https://umpedrogallego.github.io/site/json/trabalhos.json";
    const THUMB_BASE = "https://umpedrogallego.github.io/site/thumb/";
    const MIDIA_BASE = "https://umpedrogallego.github.io/site/midia/";

    const slotClasses = ['slot-1', 'slot-2', 'slot-3', 'slot-4', 'slot-5'];

    async function init() {
        try {
            const res = await fetch(URL_JSON);
            const data = await res.json();
            
            // 1. Filtro: Mantém apenas o que deve ser incluído e não é 'N'
            const dataFiltrada = data.filter(w => w.DESTAQUE !== 'N' && w.INCLUIR !== "");

            // 2. Agrupamento por Série: Exibe apenas uma imagem por série (relação consolidada)
            const grupos = {};
            dataFiltrada.forEach(item => {
                const chave = (item.SERIE && item.SERIE.trim() !== "") ? item.SERIE : `SINGLE_${item.ID}`;
                if (!grupos[chave]) grupos[chave] = [];
                grupos[chave].push(item);
            });

            // 3. Mapeamento para o Grid: Lê DESTAQUE e SLOT diretamente do JSON
            const obras = Object.values(grupos).map(items => {
                const ref = items[0];
                return {
                    titulo: (ref.SERIE && ref.SERIE !== "") ? ref.SERIE : ref.TITULO,
                    destaque: parseInt(ref.DESTAQUE),
                    // Converte o SLOT da planilha (1-5) para o índice do array (0-4)
                    slotIdx: ref.SLOT ? (parseInt(ref.SLOT) - 1) : 0,
                    ref: ref
                };
            });

            // 4. Ordenação: Segue o índice numérico da coluna DESTAQUE
            obras.sort((a, b) => a.destaque - b.destaque);

            renderGrid(obras);
        } catch(e) {
            console.error("Falha ao carregar obras:", e);
        }
    } 

    function renderGrid(obras) {
        const grid = document.getElementById('main-grid');
        
        grid.innerHTML = obras.map((obra) => {
            const ref = obra.ref;
            const slotClass = slotClasses[obra.slotIdx];
            
            // Mantém a proporção exata definida no JSON
            const ratio = (ref.W && ref.H) ? `style="aspect-ratio: ${ref.W} / ${ref.H}"` : '';
            
            // Lógica de Mídia: Vídeo priorizado, Fallback para Thumb AVIF
            let mediaHtml = "";
            if (ref.MIDIA && ref.MIDIA.length > 2) {
                mediaHtml = `<video muted loop playsinline autoplay><source src="${MIDIA_BASE}${ref.ID}a.${ref.MIDIA}" type="video/mp4"></video>`;
            } else {
                mediaHtml = `<img src="${THUMB_BASE}${ref.ID}a.avif" loading="lazy" alt="${obra.titulo}">`;
            }

            return `
                <article class="item-obra ${slotClass}">
                    <div class="img-box" ${ratio}>
                        ${mediaHtml}
                    </div>
                    <div class="meta">
                        <strong>${obra.titulo}</strong>
                    </div>
                </article>
            `;
        }).join('');
    }

    init();
</script>
</body>
</html>
