<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro Gallego - V7</title>
    <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ecece9;
            --text: #0f0f0f;
            --border: #000;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Martian Mono', monospace;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            font-size: 11px;
            scroll-behavior: smooth;
        }

        #site-wrapper {
            max-width: 1338px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 80px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            text-transform: uppercase;
        }

        header h1 { font-size: 28px; font-weight: 500; margin: 0; letter-spacing: -1.5px; }

        /* GRID ANTI-LAYOUT */
        #main-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 100px 30px;
            align-items: start;
        }

        .item-obra {
            grid-column: span 4;
            cursor: pointer;
        }

        /* Variações de Desktop */
        .item-obra:nth-child(5n+1) { grid-column: span 5; transform: translateY(60px); }
        .item-obra:nth-child(5n+2) { grid-column: span 3; transform: translateY(-30px); }
        .item-obra:nth-child(5n+4) { grid-column: span 6; padding-left: 10%; }

        .spacer { grid-column: span 2; height: 1px; pointer-events: none; }

        /* CONTEINER DA GALERIA NO THUMB (Ajustado conforme solicitado) */
        .img-box {
            width: 100%;
            background: transparent; /* Preservado */
            border: 0px solid transparent; /* Preservado */
            transition: border 0.2s;
            overflow-x: auto; 
            display: flex;
            align-items: flex-end; /* Alinhamento na BASE solicitado */
            scroll-snap-type: x mandatory; 
            scrollbar-width: none; 
            /* A altura será ditada pelo aspect-ratio da primeira imagem */
        }

        .img-box::-webkit-scrollbar { display: none; }

        /* Remove bordas no hover conforme solicitado */
        .item-obra:hover .img-box { border: 0px solid transparent; }

        .img-box img {
            width: 100%; 
            height: 100%; 
            flex-shrink: 0;
            scroll-snap-align: start;
            display: block;
            /* Lógica de encaixe: dita pela primeira, com transparência à direita */
            object-fit: contain; 
            object-position: left bottom; 
        }

        .meta { margin-top: 15px; }
        .meta strong { display: block; font-size: 13px; text-transform: uppercase; margin-bottom: 5px; }

        @media (max-width: 800px) {
            #main-grid { grid-template-columns: repeat(6, 1fr); gap: 60px 15px; }
            .item-obra { grid-column: span 6 !important; transform: none !important; padding: 0 !important; }
            .item-obra:nth-child(4n+2), .item-obra:nth-child(4n+3) { grid-column: span 3 !important; }
        }
    </style>
</head>
<body>

<div id="site-wrapper">
    <header>
        <h1>Pedro Gallego</h1>
        <nav>obras / cv / info</nav>
    </header>
    <main id="main-grid"></main>
</div>

<script>
const URL_JSON = "https://umpedrogallego.github.io/site/json/trabalhos.json";
const IMG_BASE = "https://umpedrogallego.github.io/site/img/";
let listaObras = [];

async function init() {
    try {
        const res = await fetch(URL_JSON);
        listaObras = await res.json();
        // Ordenação Destaque > Ano
        listaObras.sort((a,b) => (a.DESTAQUE || 20) - (b.DESTAQUE || 20) || b.ANO - a.ANO);
        render();
    } catch(e) { console.error(e); }
}

function render() {
    const grid = document.getElementById('main-grid');
    let html = '';

    listaObras.forEach((o, i) => {
        if (i > 0 && i % 4 === 0) html += '<div class="spacer"></div>';

        // Primeira imagem dita a proporção (Aspect Ratio)
        const ratio = o.W && o.H ? `style="aspect-ratio: ${o.W} / ${o.H}"` : '';
        const count = o.IMG_COUNT || 1;
        
        // Loop Infinito: Duplicamos a lista de imagens para permitir o scroll contínuo
        let galleryHtml = '';
        const iterations = count > 1 ? 3 : 1; // Duplicamos 3x para garantir o scroll infinito visual
        
        for (let t = 0; t < iterations; t++) {
            for (let j = 0; j < count; j++) {
                const letra = String.fromCharCode(97 + j);
                galleryHtml += `
                    <img src="${IMG_BASE}${o.ID}${letra}.jpg" 
                         loading="lazy" 
                         onerror="this.src='${IMG_BASE}${o.ID}${letra}.avif'; this.onerror=function(){this.remove()}">
                `;
            }
        }

        html += `
            <article class="item-obra">
                <div class="img-box" ${ratio} onscroll="handleInfiniteScroll(this)">
                    ${galleryHtml}
                </div>
                <div class="meta">
                    <strong>${o.TITULO}</strong>
                    <span>${o.ANO}</span>
                </div>
            </article>
        `;
    });
    grid.innerHTML = html;
}

// Lógica de Scroll Infinito
function handleInfiniteScroll(el) {
    const scrollLeft = el.scrollLeft;
    const scrollWidth = el.scrollWidth;
    const clientWidth = el.clientWidth;

    // Se chegar perto do fim do conteúdo duplicado, volta para o meio sem animação
    if (scrollLeft + clientWidth >= scrollWidth - 10) {
        el.scrollLeft = (scrollWidth / 3);
    } 
    // Se voltar para o início do conteúdo duplicado, pula para o meio
    else if (scrollLeft <= 10) {
        el.scrollLeft = (scrollWidth / 3);
    }
}

init();
</script>
</body>
</html>
