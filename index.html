<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro Gallego - V8</title>
    <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@100;200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ecece9;
            --text: #0f0f0f;
            --border: #000;
            --meta-color: #948a8d;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Martian Mono', monospace;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            font-size: 11px;
            scroll-behavior: smooth;
        }

        #site-wrapper {
            max-width: 1338px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            position: sticky;
            top: 0;
            background-color: var(--bg);
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            margin-bottom: 80px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            text-transform: uppercase;
        }

        header h1 { font-size: 28px; font-weight: 500; margin: 0; letter-spacing: -1.5px; }

        #main-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 100px 30px;
            align-items: start;
        }

        .item-obra {
            grid-column: span 4;
            cursor: pointer;
        }

        /* Anti-Layout Desktop */
        .item-obra:nth-child(5n+1) { grid-column: span 5; transform: translateY(60px); }
        .item-obra:nth-child(5n+2) { grid-column: span 3; transform: translateY(-30px); }
        .item-obra:nth-child(5n+4) { grid-column: span 6; padding-left: 10%; width: 90%; }

        .spacer { grid-column: span 2; height: 1px; pointer-events: none; }

        .img-box {
            width: 100%;
            background: transparent;
            border: 0px solid transparent;
            overflow-x: auto; 
            display: flex;
            align-items: flex-end; 
            gap: 8px;
            scroll-snap-type: x mandatory; 
            scrollbar-width: none; 
        }

        .img-box::-webkit-scrollbar { display: none; }

        .img-box img {
            width: 100%; 
            height: 100%; 
            flex-shrink: 0;
            scroll-snap-align: start;
            display: block;
            object-fit: contain; 
            object-position: left bottom;
        }
        
        .img-box img:hover{ cursor:ew-resize;}

        .meta { margin-top: 15px; }
        .meta strong { 
            display: block; 
            font-size: 18px; 
            margin-bottom: 5px; 
            color: var(--meta-color);
            font-weight: 600;
            text-transform: uppercase;
        }

        @media (max-width: 800px) {
            #main-grid { grid-template-columns: repeat(6, 1fr); gap: 60px 15px; }
            .item-obra { grid-column: span 6 !important; transform: none !important; padding: 0 !important; }
        }
    </style>
</head>
<body>

<div id="site-wrapper">
    <header>
        <h1>Pedro Gallego</h1>
        <nav>obras / cv / info</nav>
    </header>
    <main id="main-grid"></main>
</div>

<script>
const URL_JSON = "https://umpedrogallego.github.io/site/json/trabalhos.json";
const IMG_BASE = "https://umpedrogallego.github.io/site/img/";
let listaAgrupada = [];

async function init() {
    try {
        const res = await fetch(URL_JSON);
        const data = await res.json();
        
        // 1. Filtrar obras que não têm imagens antes de qualquer processamento
        const dataFiltrada = data.filter(item => item.IMG_COUNT && item.IMG_COUNT > 0);

        // 2. Agrupar por SERIE
        const grupos = {};
        dataFiltrada.forEach(item => {
            const chave = (item.SERIE && item.SERIE.trim() !== "") ? item.SERIE : `AVULSO_${item.ID}`;
            if (!grupos[chave]) grupos[chave] = [];
            grupos[chave].push(item);
        });

        listaAgrupada = Object.values(grupos).map(items => ({
            items: items,
            destaque: items[0].DESTAQUE || 20,
            ano: items[0].ANO
        }));

        listaAgrupada.sort((a,b) => a.destaque - b.destaque || b.ano - a.ano);
        render();
    } catch(e) { console.error("Erro ao carregar dados:", e); }
}

function render() {
    const grid = document.getElementById('main-grid');
    let html = '';

    listaAgrupada.forEach((grupo, i) => {
        if (i > 0 && i % 4 === 0) html += '<div class="spacer"></div>';

        const ref = grupo.items[0];
        const ratio = ref.W && ref.H ? `style="aspect-ratio: ${ref.W} / ${ref.H}"` : '';
        
        let galleryHtml = '';
        let todasImagensDoGrupo = [];
        grupo.items.forEach(obra => {
            for (let j = 0; j < obra.IMG_COUNT; j++) {
                todasImagensDoGrupo.push({
                    obra: obra,
                    src: `${obra.ID}${String.fromCharCode(97 + j)}`
                });
            }
        });

        const loops = todasImagensDoGrupo.length > 1 ? 3 : 1;
        for (let t = 0; t < loops; t++) {
            todasImagensDoGrupo.forEach(imgData => {
                galleryHtml += `
                    <img src="${IMG_BASE}${imgData.src}.jpg" 
                         loading="lazy" 
                         data-titulo="${imgData.obra.TITULO}" 
                         onerror="this.src='${IMG_BASE}${imgData.src}.avif'; this.onerror=function(){this.remove()}">
                `;
            });
        }

        html += `
            <article class="item-obra">
                <div class="img-box" ${ratio} onscroll="syncScroll(this)">
                    ${galleryHtml}
                </div>
                <div class="meta">
                    <strong style="font-weight: 600;">${ref.TITULO}</strong>
                </div>
            </article>
        `;
    });
    grid.innerHTML = html;
}

function syncScroll(el) {
    const scrollLeft = el.scrollLeft;
    const scrollWidth = el.scrollWidth;
    const clientWidth = el.clientWidth;
    const gap = 8;

    // Scroll Infinito
    const setWidth = (scrollWidth + gap) / 3;
    if (scrollLeft <= 5) {
        el.scrollLeft = setWidth + 5;
    } else if (scrollLeft + clientWidth >= scrollWidth - 5) {
        el.scrollLeft = setWidth - clientWidth + 5;
    }

    // Título Dinâmico (Busca a imagem mais próxima da borda esquerda)
    const images = Array.from(el.querySelectorAll('img'));
    if (images.length === 0) return;

    // Encontra qual imagem está atualmente visível (baseado na posição relativa ao container)
    let imagemAtiva = images[0];
    let menorDistancia = Infinity;

    images.forEach(img => {
        const dist = Math.abs(img.offsetLeft - el.scrollLeft);
        if (dist < menorDistancia) {
            menorDistancia = dist;
            imagemAtiva = img;
        }
    });
    
    const novoTitulo = imagemAtiva.getAttribute('data-titulo');
    const metaStrong = el.nextElementSibling.querySelector('strong');
    
    if (metaStrong && metaStrong.innerText !== novoTitulo) {
        metaStrong.innerText = novoTitulo;
    }
}

init();
</script>
</body>
</html>
