<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro Gallego — CV</title>
    <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ecece9;
            --text: #0f0f0f;
            --border: #d1d1cf;
            --font-header: clamp(18px, 4vw, 24px);
            --font-grid: clamp(13px, 1.5vw, 15px);
            --font-ficha: clamp(11px, 1.1vw, 13px);
        }

        body.dark-mode {
            --bg: #121212;
            --text: #e0e0e0;
            --border: #333333;
        }

        body {
            font-family: 'Martian Mono', monospace;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.6;
        }

        /* HEADER */
        header {
            padding: clamp(20px, 5vw, 40px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            text-transform: uppercase;
        }
        header h1 { font-weight: 800; font-size: var(--font-header); margin: 0; letter-spacing: -1px; }
        header a { color: var(--text); text-decoration: none; }

        .nav-links { display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: var(--text); font-size: 12px; }
        .nav-links a.active { font-weight: 800; text-decoration: underline; }

        .theme-toggle { cursor: pointer; background: none; border: none; color: var(--text); padding: 0; display: flex; align-items: center; }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: clamp(40px, 8vw, 80px) clamp(20px, 5vw, 40px);
        }

        /* CV SECTIONS */
        .cv-section {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            border-top: 1px solid var(--border);
            padding: 30px 0;
        }

        .section-title {
            font-weight: 800;
            font-size: 13px;
            text-transform: lowercase;
        }

        .cv-item {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 20px;
            margin-bottom: 12px;
            font-size: var(--font-ficha);
        }

        .item-year { font-weight: 300; opacity: 0.6; }
        .item-text { font-weight: 400; }
        .item-text i { font-style: italic; }
        .item-text strong { font-weight: 700; }

        @media (max-width: 768px) {
            .cv-section { grid-template-columns: 1fr; }
            .cv-item { grid-template-columns: 60px 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div style="flex: 1;"><a href="index.html"><h1>Pedro Gallego</h1></a></div>
    
    <div style="flex: 1; display: flex; justify-content: center;">
        <button id="theme-btn" class="theme-toggle" onclick="toggleDarkMode()">
            <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        </button>
    </div>

    <div class="nav-links" style="flex: 1; justify-content: flex-end;">
        <a href="index.html">obras</a>
        <a href="cv.html" class="active">cv</a>
        <a href="info.html">info</a>
    </div>
</header>

<main id="cv-content"></main>

<script>
    const CV_URL = "https://umpedrogallego.github.io/site/json/cv.json";

    async function initCV() {
        try {
            const response = await fetch(CV_URL);
            const data = await response.json();
            
            if (Array.isArray(data)) {
                renderCV(data);
            } else {
                console.error("Estrutura do JSON inesperada. Esperava um Array.");
            }
        } catch (err) {
            console.error("Erro ao carregar CV:", err);
        }
    }

    function renderCV(rows) {
        const container = document.getElementById('cv-content');
        
        rows = rows.filter(row => row.INCLUIR && row.INCLUIR.trim() !== "");

        // Agrupa por CATEGORIA (respeitando a caixa alta do seu JSON)
        const categories = {};
        rows.forEach(row => {
            const cat = row.CATEGORIA || "outros";
            if (!categories[cat]) categories[cat] = [];
            categories[cat].push(row);
        });

        container.innerHTML = Object.keys(categories).map(title => `
            <section class="cv-section">
                <div class="section-title">${title}</div>
                <div class="cv-items">
                    ${categories[title].map(item => {
                        // Constrói o texto combinando os campos presentes
                        let info = `<strong>${item.TITULO || ""}</strong>`;
                        if (item.CURADORIA) info += `, curadoria de ${item.CURADORIA}`;
                        if (item.LOCAL) info += `, ${item.LOCAL}`;
                        if (item.CIDADE) info += `, ${item.CIDADE}`;
                        if (item.PERIODO) info += ` (${item.PERIODO})`;

                        return `
                            <div class="cv-item">
                                <div class="item-year">${item.ANO || ""}</div>
                                <div class="item-text">${info}.</div>
                            </div>
                        `;
                    }).join('')}
                </div>
            </section>
        `).join('');
    }

    // MODO ESCURO
    function toggleDarkMode() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        updateIcon(isDark);
    }

    function updateIcon(isDark) {
        const icon = document.getElementById('theme-icon');
        if (isDark) {
            icon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
        } else {
            icon.innerHTML = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
        }
    }

    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        updateIcon(true);
    }

    initCV();
</script>
</body>
</html>
